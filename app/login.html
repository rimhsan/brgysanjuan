<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Barangay San Juan</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="auth-overlay" id="auth-overlay" style="display:flex;">
        <div class="auth-box">
            <div class="auth-header">
                <div class="auth-logo">🏛️</div>
                <h1>Barangay San Juan</h1>
                <p>Iriga City, Camarines Sur</p>
            </div>
            
            <!-- Login Form -->
            <div id="login-form" class="auth-form">
                <h2>Welcome Back</h2>
                <div class="form-group"><label>Email Address</label><input type="email" id="login-email" placeholder="you@example.com"></div>
                <div class="form-group"><label>Password</label><input type="password" id="login-password" placeholder="••••••••"></div>
                <button class="btn btn-primary btn-full" onclick="handleLogin()">Login</button>
                <p class="auth-switch">Don't have an account? <a href="#" onclick="toggleAuthMode('signup')">Sign up</a></p>
            </div>
            
            <!-- Signup Form -->
            <div id="signup-form" class="auth-form" style="display:none;">
                <h2>Create Resident Account</h2>
                <div class="form-row">
                    <div class="form-group"><label>First Name</label><input type="text" id="signup-fname" placeholder="Juan"></div>
                    <div class="form-group"><label>Last Name</label><input type="text" id="signup-lname" placeholder="Dela Cruz"></div>
                </div>
                <div class="form-group"><label>Purok</label><select id="signup-purok"><option value="">Select Purok</option><option value="Purok 1">Purok 1</option><option value="Purok 2">Purok 2</option><option value="Purok 3">Purok 3</option><option value="Purok 4">Purok 4</option><option value="Purok 5">Purok 5</option></select></div>
                <div class="form-group"><label>Email Address</label><input type="email" id="signup-email" placeholder="you@example.com"></div>
                <div class="form-group"><label>Password (min 6 characters)</label><input type="password" id="signup-password" placeholder="••••••••"></div>
                <button class="btn btn-accent btn-full" onclick="handleSignup()">Create Account</button>
                <p class="auth-switch">Already have an account? <a href="#" onclick="toggleAuthMode('login')">Login</a></p>
            </div>
            
            <div id="auth-error" class="auth-error"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
