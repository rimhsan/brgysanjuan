        <!-- Content -->
        <div class="content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h1 class="page-title">Court Schedule</h1>
                ${userRole === 'admin' ? '<span class="badge badge-admin">Admin View</span>' : ''}
            </div>
            
            <div class="court-layout">
                <!-- Left Side: Calendar & Controls -->
                <div class="court-main">
                    <div class="calendar-header">
                        <div class="current-month" id="current-month">Loading...</div>
                        <div class="calendar-nav">
                            <button onclick="changeMonth(-1)">◀</button>
                            <button onclick="changeMonth(1)">▶</button>
                        </div>
                    </div>
                    
                    <div class="calendar-grid" id="calendar-grid">
                        <!-- Grid Headers -->
                        <div class="day-header">Sun</div><div class="day-header">Mon</div><div class="day-header">Tue</div><div class="day-header">Wed</div><div class="day-header">Thu</div><div class="day-header">Fri</div><div class="day-header">Sat</div>
                        <!-- Days will be injected here by JS -->
                    </div>
                    
                    <div class="bottom-actions">
                        <button class="btn btn-accent" onclick="openBookingModal()">📅 Book a Slot</button>
                    </div>
                </div>

                <!-- Right Side: Recent Bookings (Admin Only) -->
                <div class="court-sidebar" id="admin-court-sidebar" style="display:none;">
                    <div class="card">
                        <div class="card-header">
                            <h3>📋 Recent Bookings</h3>
                            <button class="btn btn-sm btn-outline" onclick="initCalendar(true)">Refresh</button>
                        </div>
                        <div class="card-body" style="padding:16px;">
                            <div id="admin-recent-bookings-list">
                                <p style="text-align:center;color:#7f8c8d;font-size:13px;">Loading...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Booking Modal (Updated for Edit/Delete) -->
    <div class="modal-overlay" id="courtModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="court-modal-title">📅 Book Court Slot</h3>
                <button class="modal-close" onclick="closeModal('courtModal')">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="court-booking-edit-id">
                
                <div class="form-group">
                    <label>Your Name / Team *</label>
                    <input type="text" id="court-booker" placeholder="e.g., Purok 3 Team">
                </div>
                
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="court-date" readonly style="background:#f8f9fa; cursor:not-allowed;">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Start Time *</label>
                        <input type="time" id="court-start-time" min="06:00" max="19:00">
                    </div>
                    <div class="form-group">
                        <label>End Time *</label>
                        <input type="time" id="court-end-time" min="06:00" max="19:00">
                    </div>
                </div>
                <p style="font-size:12px;color:var(--text-light);margin-top:-10px;margin-bottom:15px;">Court hours: 6:00 AM - 7:00 PM</p>
                
                <div class="form-group">
                    <label>Activity</label>
                    <select id="court-activity">
                        <option value="Basketball">Basketball</option>
                        <option value="Volleyball">Volleyball</option>
                        <option value="Barangay Event">Barangay Event</option>
                        <option value="Practice">Practice</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer" style="justify-content: space-between;">
                <button id="btn-delete-booking" class="btn btn-danger" onclick="deleteCurrentBooking()" style="display:none;">🗑️ Delete</button>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-outline" onclick="closeModal('courtModal')">Cancel</button>
                    <button class="btn btn-accent" onclick="bookCourt()">✅ Confirm Booking</button>
                </div>
            </div>
        </div>
    </div>
